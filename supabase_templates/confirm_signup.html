
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .container { background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 40px; text-align: center; }
    .logo { color: #000; font-size: 24px; font-weight: bold; margin-bottom: 24px; text-decoration: none; display: inline-block; }
    .code { font-size: 32px; font-weight: bold; letter-spacing: 4px; background-color: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin: 24px 0; color: #0f172a; font-family: monospace; }
    .footer { font-size: 12px; color: #64748b; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">REPFIT</div>
    <h2>Confirm your signup</h2>
    <p>Use the code below to complete your registration:</p>
    
    <div class="code">{{ .Token }}</div>
    
    <p>This code will expire in 5 minutes.</p>
    
    <div class="footer">
      If you didn't request this email, you can safely ignore it.
    </div>
  </div>
</body>
</html>
